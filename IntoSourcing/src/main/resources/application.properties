spring.application.name=purchase-order-system
spring.application.title=Purchase Order Data Management System

# Server Configuration
server.port=8080
server.servlet.context-path=/api

# PostgreSQL Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/intosourcing
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# Jackson Configuration
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.serialization.indent-output=true
spring.jackson.default-property-inclusion=non_null

# Security JWT
jwt.secret=your-secret-key-change-in-production-at-least-256-bits-long-for-security-purposes
jwt.expiration=86400000

# Currency API Configuration (Free tier from Open Exchange Rates or Fixer.io)
currency.api.url=https://api.exchangerate-api.com/v4/latest/
currency.api.key=${CURRENCY_API_KEY:demo}

# File Upload Configuration
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB
file.upload.dir=uploads/

# Logging
logging.level.root=INFO
logging.level.com.intosourcing=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

