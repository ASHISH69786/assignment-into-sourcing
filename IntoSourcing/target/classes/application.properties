spring.application.name=purchase-order-system
spring.application.title=Purchase Order Data Management System

# Server Configuration
server.port=8080
server.servlet.context-path=/api

# MongoDB Configuration
spring.data.mongodb.uri=mongodb+srv://asissrma:71512378@ashish-cluster.tapr3zw.mongodb.net/
spring.data.mongodb.database=intosourcing
spring.data.mongodb.auto-index-creation=true
# Alternative configuration (if not using URI):
# spring.data.mongodb.host=localhost
# spring.data.mongodb.port=27017
# spring.data.mongodb.database=intosourcing
# spring.data.mongodb.username=
# spring.data.mongodb.password=

# Jackson Configuration
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.serialization.indent-output=true
spring.jackson.default-property-inclusion=non_null

# Security JWT
jwt.secret=your-secret-key-change-in-production-at-least-256-bits-long-for-security-purposes
jwt.expiration=86400000

# Currency API Configuration (Free tier from Open Exchange Rates or Fixer.io)
currency.api.url=https://api.exchangerate-api.com/v4/latest/
currency.api.key=${CURRENCY_API_KEY:demo}

# File Upload Configuration
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB
file.upload.dir=uploads/

# Logging
logging.level.root=INFO
logging.level.com.intosourcing=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

